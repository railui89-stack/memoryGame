<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Spiel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f5f4ef;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  h1 { font-size: 1.4rem; font-weight: 500; color: #222; margin-bottom: 1rem; }
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .stat {
    background: #fff;
    border: 0.5px solid #ddd;
    border-radius: 10px;
    padding: 8px 20px;
    text-align: center;
    min-width: 80px;
  }
  .stat-label { font-size: 11px; color: #888; }
  .stat-val { font-size: 22px; font-weight: 500; color: #222; }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 520px;
    width: 100%;
  }
  .card {
    aspect-ratio: 1;
    cursor: pointer;
    perspective: 600px;
    user-select: none;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    border-radius: 12px;
  }
  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }
  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-front {
    background: #e0ddd5;
    border: 0.5px solid #ccc;
    font-size: 2.5rem;
    color: #999;
    font-weight: 300;
  }
  .card-back {
    transform: rotateY(180deg);
    background: #fff;
    border: 0.5px solid #ddd;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    display: block;
  }
  .card.matched .card-back {
    border: 2px solid #1D9E75;
  }
  .card.matched .card-back img {
    opacity: 0.85;
  }
  .btn {
    margin-top: 1.25rem;
    padding: 8px 22px;
    border: 0.5px solid #bbb;
    border-radius: 8px;
    background: transparent;
    font-size: 14px;
    color: #444;
    cursor: pointer;
  }
  .btn:hover { background: #eee; }
  #win {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem 1rem;
    max-width: 520px;
    width: 100%;
  }
  .win-img-wrap {
    width: 100%;
    max-width: 420px;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 1.25rem;
    border: 0.5px solid #ddd;
    animation: pop .6s cubic-bezier(.17,.89,.32,1.28) both;
  }
  .win-img-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }
  @keyframes pop {
    0% { transform: scale(.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .win-title { font-size: 24px; font-weight: 500; color: #222; margin-bottom: 6px; }
  .win-sub { font-size: 15px; color: #777; margin-bottom: 1.5rem; }
</style>
</head>
<body>

<div id="game-view" style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:520px;">
  <h1>Memory</h1>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Züge</div>
      <div class="stat-val" id="moves">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Paare</div>
      <div class="stat-val" id="pairs">0 / 8</div>
    </div>
  </div>
  <div class="board" id="board"></div>
  <button class="btn" onclick="init()">Neu starten ↺</button>
</div>

<div id="win">
  <div class="win-img-wrap">
    <img src="./Bilder/PXL_20260325_173750586.jpg" alt="Gewinnerbild">
  </div>
  <p class="win-title">Glückwunsch!</p>
  <p class="win-sub" id="win-msg"></p>
  <p class="win-extra">Damit machst du DIESES Paar besonders glücklich!!</p>
  <button class="btn" onclick="init()">Nochmal spielen</button>
</div>

<script>
const IMAGES = [
  './Bilder/PXL_20260325_153503492.TS-000.jpg',
  './Bilder/PXL_20260325_180151655.jpg',
  './Bilder/Picture12.jpg',
  './Bilder/Picture11.png',
  './Bilder/Picture10.svg.png',
  './Bilder/Picture9.png',
  './Bilder/Picture13.jpg',
  './Bilder/Picture7.png',
];

let cards = [], flipped = [], matched = 0, moves = 0, locked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  flipped = []; matched = 0; moves = 0; locked = false;
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = '0 / 8';
  document.getElementById('win').style.display = 'none';
  document.getElementById('game-view').style.display = 'flex';

  cards = shuffle([...IMAGES, ...IMAGES]).map((src, i) => ({
    id: i, src, flipped: false, matched: false
  }));

  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<div class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back"><img src="${card.src}" alt="Karte"></div>
    </div>`;
    el.addEventListener('click', () => flipCard(card.id, el));
    board.appendChild(el);
  });
}

function flipCard(id, el) {
  if (locked) return;
  const card = cards[id];
  if (card.flipped || card.matched || flipped.length === 2) return;
  card.flipped = true;
  el.classList.add('flipped');
  flipped.push({ id, el });
  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;
    setTimeout(checkMatch, 950);
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (cards[a.id].src === cards[b.id].src) {
    cards[a.id].matched = cards[b.id].matched = true;
    a.el.classList.add('matched');
    b.el.classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent = matched + ' / 8';
    flipped = []; locked = false;
    if (matched === 8) setTimeout(showWin, 500);
  } else {
    cards[a.id].flipped = cards[b.id].flipped = false;
    a.el.classList.remove('flipped');
    b.el.classList.remove('flipped');
    flipped = []; locked = false;
  }
}

function showWin() {
  document.getElementById('game-view').style.display = 'none';
  document.getElementById('win-msg').textContent = 'Du hast alle 8 Paare in ' + moves + ' Zügen gefunden!';
  document.getElementById('win').style.display = 'flex';
  document.getElementById('win').style.flexDirection = 'column';
  document.getElementById('win').style.alignItems = 'center';
}

init();
</script>
</body>
</html>
